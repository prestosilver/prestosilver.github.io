<!DOCTYPE html>

<html>
  <head>
    <title>Prestosilver</title>
    <script src="https://kit.fontawesome.com/3a549b1b6b.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Varela+Round">
    <style>

/* The animation code */
@keyframes aHover {
  from {
    font-size: 8rem;
  }
  to {
    font-size: 9rem;
  }
}

@keyframes aUnhover {
  from {
    font-size: 9rem;
  }
  to {
    font-size: 8rem;
  }
}

@keyframes appear {
  from {
    margin-top: 100%;
  }
  to {
    margin-top: 0%;
  }
}

.list {
  column-count: 3;
}

.center {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100%;
  border: 0px solid green;
}

.icons {
  height: 10rem;
}

a, a:visited {
  color: #ffffff; 
  font-size: 8rem;
}

a:hover {
  font-size: 8rem;
}

li a, li a:visited {
  color: #ffffff; 
  font-size: 3rem;
  text-decoration: none;
}

li a, li a:hover {
  color: #ffffff; 
  font-size: 3rem;
  text-decoration: underline;
}

.resize {
  animation-name: aUnhover;
  animation-duration: 0.25s;
  font-size: 8rem;
}

.resize:hover {
  animation-name: aHover;
  animation-duration: 0.25s;
  font-size: 9rem;
}

button {
  background-color: #00000000;
  border: 0px;
  color: #ffffff; 
  font-size: 8rem;
  text-align: center;
  margin: auto;
}

button:hover {
  text-align: center;
  background-color: #00000000;
  border: 0px;
  color: #ffffff; 
  font-size: 8rem;
  margin: auto;
}

.label {
  font-size: 9rem;
}

.left {
  margin: 0 auto 0 0 !important;
}

.right {
  margin: 0 0 0 auto !important;
}

.icon {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100%;
  border: 0px solid green;
  padding: 0rem 1rem;
  width: 10rem;
  text-align: center;
}

.container {
  display: flex;
}

.flex-child {
  flex: 1;
  height: 10rem;
}

.card {
  background-color: #151515;
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: 2;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  transition: margin-top 0.5s;
}

body {
  height: 100vh;
  margin: 0px;
  background-color: #252525;
  font-family: "Varela Round", sans-serif;
}

.title {
  font-size: 10rem;
}

ul {
  list-style-type: none;
}
    </style>
  </head>

  <body id="body">
    
    <div class="center">
      <div id="ROOT"/>
    </div>

    <script type="text/javascript" src="/beta/index.js"></script>

  </body>
</html>
